services:
  app:
    build: ./app
    container_name: node-app
    restart: always

  nginx:
    image: nginx:latest
    container_name: nginx-server
    restart: always

    ports:
      - "80:80"
      - "443:443"

    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
      - ./certbot/www:/var/www/certbot

    depends_on:
      - app
